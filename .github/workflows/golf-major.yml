name: Golf Major Bonus (Wed 11 AM ET)

on:
  schedule:
    # Wednesday 11 AM ET — pre-tournament lock for golf majors.
    # DST-aware twin crons; engine bails when ET hour isn't 11.
    - cron: '0 15 * * 3'
    - cron: '0 16 * * 3'
  workflow_dispatch: {}

jobs:
  golf_major:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: edge-engine
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check for active major and generate bonus pick
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ODDS_API_KEY:      ${{ secrets.ODDS_API_KEY }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          TZ: America/New_York
        run: python -m engine.main golf_major

      - name: Commit + push data updates (retry-on-race)
        run: |
          git config user.name  "scott-bot[bot]"
          git config user.email "scott-bot@users.noreply.github.com"
          git add site/data.json site/analytics.json data/*.json || true
          git diff --cached --quiet && { echo "No major this week — nothing to commit."; exit 0; }
          git commit -m "golf-major: bonus pick $(date -u +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "Push rejected (attempt $i). Rebasing..."
            git fetch origin main && git rebase origin/main || exit 1
            sleep $((i * 3))
          done
          exit 1
