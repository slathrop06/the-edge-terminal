name: Morning Picks (11:00 AM ET)

on:
  schedule:
    # DST-aware: fire at both 15:00 UTC (EDT 11 AM) and 16:00 UTC (EST 11 AM).
    # The engine code guards: it bails immediately if NYC's wall-clock hour isn't 11,
    # so only the correct one of these two crons actually does work each day.
    - cron: '0 15 * * *'
    - cron: '0 16 * * *'
  workflow_dispatch: {}

jobs:
  picks:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: edge-engine
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run morning pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ODDS_API_KEY:      ${{ secrets.ODDS_API_KEY }}
          OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          TZ: America/New_York
        run: python -m engine.main morning

      - name: Commit + push data updates (retry-on-race)
        run: |
          git config user.name  "scott-bot[bot]"
          git config user.email "scott-bot@users.noreply.github.com"
          git add site/data.json site/analytics.json data/*.json || true
          git diff --cached --quiet && { echo "No data changes to commit."; exit 0; }
          git commit -m "picks: morning run $(date -u +%Y-%m-%d)" -m "Auto-generated by scott-bot."
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "Push rejected (attempt $i). Rebasing on origin/main..."
            git fetch origin main
            git rebase origin/main || { echo "Rebase failed."; exit 1; }
            sleep $((i * 3))
          done
          echo "Push failed after 5 attempts."
          exit 1
