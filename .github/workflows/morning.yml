name: Morning Picks (6:00 AM ET)

on:
  schedule:
    # 10:00 UTC = 6 AM EDT (Mar–Nov) / 5 AM EST (Nov–Mar). The early start in winter is fine —
    # picks just go live a touch earlier; cron in GitHub Actions can't be DST-aware.
    - cron: '0 10 * * *'
  workflow_dispatch: {}

jobs:
  picks:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: edge-engine
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run morning pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ODDS_API_KEY:      ${{ secrets.ODDS_API_KEY }}
          OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY }}
          TZ: America/New_York
        run: python -m engine.main morning

      - name: Commit + push data updates
        run: |
          git config user.name  "scott-bot[bot]"
          git config user.email "scott-bot@users.noreply.github.com"
          git add site/data.json site/analytics.json data/*.json || true
          git diff --cached --quiet && echo "No data changes to commit." || (
            git commit -m "picks: morning run $(date -u +%Y-%m-%d)" -m "Auto-generated by scott-bot."
            git push
          )
