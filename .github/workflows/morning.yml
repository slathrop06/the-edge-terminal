name: Morning Picks (11:00 AM ET)

on:
  schedule:
    # Seven cron triggers across the morning window. The engine's
    # _should_run_morning() guard is idempotent and time-gated:
    #   - If today's picks are already locked, the run is a no-op.
    #   - If NYC's wall clock is before 11:00 ET, the run waits for the
    #     next cron (so the EST-window 15:00 UTC fire bails in EDT? — no,
    #     it's 11:00 EDT, so it fires for real; the early ones bail only
    #     in EST mode when NYC is still at 10:xx ET).
    # Year-round behavior:
    #   EDT (Mar–Nov): 15:00 UTC = 11:00 ET → publishes. 15:30…18:00 no-op.
    #   EST (Nov–Mar): 15:00 UTC = 10:00 ET → time-gate bails.
    #                  15:30 UTC = 10:30 ET → time-gate bails.
    #                  16:00 UTC = 11:00 ET → publishes. 16:30…18:00 no-op.
    # If GH Actions skips OR delays one cron, the next 30-min cron catches
    # it. The last chance (18:00 UTC) gives us up to a 3-hour catch-up
    # window in EDT, 2-hour in EST — long enough to survive any realistic
    # GH Actions outage. workflow_dispatch always bypasses the guard.
    - cron: '0 15 * * *'    # 11:00 EDT / 10:00 EST
    - cron: '30 15 * * *'   # 11:30 EDT / 10:30 EST
    - cron: '0 16 * * *'    # 12:00 EDT / 11:00 EST  ← EST primary
    - cron: '30 16 * * *'   # 12:30 EDT / 11:30 EST
    - cron: '0 17 * * *'    # 13:00 EDT / 12:00 EST
    - cron: '30 17 * * *'   # 13:30 EDT / 12:30 EST
    - cron: '0 18 * * *'    # 14:00 EDT / 13:00 EST  (last chance)
  workflow_dispatch: {}

jobs:
  picks:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: edge-engine
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run morning pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ODDS_API_KEY:      ${{ secrets.ODDS_API_KEY }}
          OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          TZ: America/New_York
        run: python -m engine.main morning

      - name: Commit + push data updates (retry-on-race)
        run: |
          git config user.name  "scott-bot[bot]"
          git config user.email "scott-bot@users.noreply.github.com"
          git add site/data.json site/analytics.json data/*.json || true
          git diff --cached --quiet && { echo "No data changes to commit."; exit 0; }
          git commit -m "picks: morning run $(date -u +%Y-%m-%d)" -m "Auto-generated by scott-bot."
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "Push rejected (attempt $i). Rebasing on origin/main..."
            git fetch origin main
            git rebase origin/main || { echo "Rebase failed."; exit 1; }
            sleep $((i * 3))
          done
          echo "Push failed after 5 attempts."
          exit 1
