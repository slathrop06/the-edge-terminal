name: Grader (multiple checks per day)

# The grader is idempotent — it only acts on PEND picks. Running it more
# often is safe and cheap. Schedule:
#
#   DAILY (Mon–Sun)
#     - 11:00 PM ET  → after most East Coast evening games
#     - 01:30 AM ET  → after West Coast / late games
#
#   WEEKEND extras (Sat + Sun)
#     - 06:00 PM ET  → after early afternoon (1 PM ET) day games
#     - 09:00 PM ET  → after late afternoon / early evening games
#
# Each schedule time has DST-twin crons (UTC and UTC+1) so it fires
# at the right ET wall-clock hour year-round.
on:
  schedule:
    # ── Daily evening check at 11:00 PM ET ───────────────────────
    - cron: '0 3 * * *'      # 23:00 EDT → 03:00 UTC daily
    - cron: '0 4 * * *'      # 23:00 EST → 04:00 UTC daily
    # ── Daily late-night check at 01:30 AM ET ────────────────────
    - cron: '30 5 * * *'     # 01:30 EDT → 05:30 UTC daily
    - cron: '30 6 * * *'     # 01:30 EST → 06:30 UTC daily
    # ── Weekend afternoon check at 06:00 PM ET (Sat + Sun) ───────
    - cron: '0 22 * * 0,6'   # 18:00 EDT Sun/Sat → 22:00 UTC
    - cron: '0 23 * * 0,6'   # 18:00 EST Sun/Sat → 23:00 UTC
    # ── Weekend early-evening check at 09:00 PM ET (Sat + Sun) ───
    # Sat 21:00 ET → Sun 01:00 UTC (next day) ; Sun 21:00 ET → Mon 01:00 UTC
    - cron: '0 1 * * 0,1'    # 21:00 EDT Sat (Sun 01:00 UTC) + Sun (Mon 01:00 UTC)
    - cron: '0 2 * * 0,1'    # 21:00 EST equivalents
  workflow_dispatch:
    inputs:
      date:
        description: "Date to grade (YYYY-MM-DD); blank = all PEND picks"
        required: false

jobs:
  grade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: edge-engine
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run grader
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TZ: America/New_York
        run: python -m engine.main grader

      - name: Commit + push data updates (retry-on-race)
        run: |
          git config user.name  "scott-bot[bot]"
          git config user.email "scott-bot@users.noreply.github.com"
          git add site/data.json site/analytics.json data/*.json || true
          git diff --cached --quiet && { echo "No grading changes."; exit 0; }
          git commit -m "grader: $(date -u +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "Push rejected (attempt $i). Rebasing..."
            git fetch origin main && git rebase origin/main || exit 1
            sleep $((i * 3))
          done
          exit 1
