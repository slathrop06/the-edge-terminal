name: Grader (11:30 PM ET previous day)

on:
  schedule:
    - cron: '30 3 * * *'   # 11:30 PM ET previous day (EDT)
  workflow_dispatch:
    inputs:
      date:
        description: "Date to grade (YYYY-MM-DD); defaults to today ET"
        required: false

jobs:
  grade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: edge-engine
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run grader
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TZ: America/New_York
        run: python -m engine.main grader

      - name: Commit + push data updates
        run: |
          git config user.name  "scott-bot[bot]"
          git config user.email "scott-bot@users.noreply.github.com"
          git add site/data.json site/analytics.json data/*.json || true
          git diff --cached --quiet && echo "No grading changes." || (
            git commit -m "grader: $(date -u +%Y-%m-%d)"
            git push
          )
