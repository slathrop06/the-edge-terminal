name: Grader (multiple checks per day)
# deploy-trigger: 2026-05-26T22:00Z-grade-props

# The grader is idempotent — it only acts on PEND picks. Running it more
# often is safe and cheap.
on:
  schedule:
    - cron: '0 3 * * *'
    - cron: '0 4 * * *'
    - cron: '30 5 * * *'
    - cron: '30 6 * * *'
    - cron: '0 22 * * 0,6'
    - cron: '0 23 * * 0,6'
    - cron: '0 1 * * 0,1'
    - cron: '0 2 * * 0,1'
  push:
    branches: [main]
    paths:
      - '.github/workflows/grader.yml'
      - 'engine/grader.py'
  workflow_dispatch:
    inputs:
      date:
        description: "Date to grade (YYYY-MM-DD); blank = all PEND picks"
        required: false

jobs:
  grade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: edge-engine
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run grader
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TZ: America/New_York
        run: python -m engine.main grader

      - name: Commit + push data updates (retry-on-race)
        run: |
          git config user.name  "scott-bot[bot]"
          git config user.email "scott-bot@users.noreply.github.com"
          git add site/data.json site/analytics.json data/*.json || true
          git diff --cached --quiet && { echo "No grading changes."; exit 0; }
          git commit -m "grader: $(date -u +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "Push rejected (attempt $i). Rebasing..."
            git fetch origin main && git rebase origin/main || exit 1
            sleep $((i * 3))
          done
          exit 1
