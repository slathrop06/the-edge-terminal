name: Morning Picks v2 (11:00 AM ET)

# Duplicate of morning.yml under a fresh filename. GitHub auto-disabled
# the original morning.yml on 2026-05-21 — neither the 7 scheduled crons
# nor a push trigger fired all day, while the grader workflow ran
# normally over the same window. Creating a new workflow file gets a
# fresh registration; the engine code (engine/main.py) is unchanged.

on:
  schedule:
    - cron: '0 15 * * *'    # 11:00 EDT / 10:00 EST
    - cron: '30 15 * * *'   # 11:30 EDT / 10:30 EST
    - cron: '0 16 * * *'    # 12:00 EDT / 11:00 EST  ← EST primary
    - cron: '30 16 * * *'   # 12:30 EDT / 11:30 EST
    - cron: '0 17 * * *'    # 13:00 EDT / 12:00 EST
    - cron: '30 17 * * *'   # 13:30 EDT / 12:30 EST
    - cron: '0 18 * * *'    # 14:00 EDT / 13:00 EST  (last chance)
  push:
    branches: [main]
    paths-ignore:
      - 'site/data.json'
      - 'site/analytics.json'
      - 'data/**'
      - 'README.md'
      - 'SETUP_HANDOFF.md'
  workflow_dispatch: {}

jobs:
  picks:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: edge-engine
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run morning pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ODDS_API_KEY:      ${{ secrets.ODDS_API_KEY }}
          OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          TZ: America/New_York
        run: python -m engine.main morning

      - name: Commit + push data updates (retry-on-race)
        run: |
          git config user.name  "scott-bot[bot]"
          git config user.email "scott-bot@users.noreply.github.com"
          git add site/data.json site/analytics.json data/*.json || true
          git diff --cached --quiet && { echo "No data changes to commit."; exit 0; }
          git commit -m "picks: morning run $(date -u +%Y-%m-%d)" -m "Auto-generated by scott-bot."
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "Push rejected (attempt $i). Rebasing on origin/main..."
            git fetch origin main
            git rebase origin/main || { echo "Rebase failed."; exit 1; }
            sleep $((i * 3))
          done
          echo "Push failed after 5 attempts."
          exit 1
