sports:
  enabled: [MLB, NBA, NHL, NFL, CFB]

schedule:
  morning_et: "11:00"
  midday_et:  "13:00"
  evening_et: "17:00"
  grader_et:  "23:30"

limits:
  max_picks_per_day: 3
  max_juice: -150
  data_confidence_floor: 0.6
  min_edge_cents: 8

claude:
  primary_model: "claude-opus-4-7"
  fallback_model: "claude-sonnet-4-6"
  temperature: 0.2
  max_tokens: 8000
  use_web_search: true

cost_cap:
  daily_usd: 8.0

ladder:
  target: 10                    # rungs to complete a climb

odds_api:
  region: "us"
  markets: ["h2h", "spreads", "totals"]
  # The boys use DK / FD / MGM. Everything else is filtered out.
  books_enabled: ["draftkings", "fanduel", "betmgm"]
  # BetMGM URLs come back with a {state} placeholder (sports.{state}.betmgm.com).
  # Set this to the boys' state code (e.g. "nj", "pa", "ny", "va", "mi", "co", "mn").
  betmgm_state_code: "nj"
  sports:
    MLB: "baseball_mlb"
    NBA: "basketball_nba"
    NHL: "icehockey_nhl"
    NFL: "americanfootball_nfl"
    CFB: "americanfootball_ncaaf"

# Ladder challenge — target ~even money so a win doubles the unit (1u → 2u total).
# Picks at odds in this American-odds band qualify as ladder candidates.
ladder:
  target: 10
  odds_min: -125     # most-favored allowed
  odds_max:  +130    # least-favored allowed
