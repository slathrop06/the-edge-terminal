[build]
  publish = "site"
  command = ""

[[headers]]
  for = "/data.json"
  [headers.values]
    Cache-Control = "public, max-age=60, must-revalidate"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/analytics.json"
  [headers.values]
    Cache-Control = "public, max-age=60, must-revalidate"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
